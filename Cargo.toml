[workspace]
members = [
    "core",
    "strata",
]
resolver = "3"

[workspace.dependencies]
ruc = "9.1.0"
thiserror = "2.0"

parking_lot = "0.12.1"

serde = { version = "1.0.136", features = ["derive"] }
serde_cbor_2 = "0.13.0"
sha3 = "0.10"

rocksdb = { version = "0.24.0", default-features = false, features = ["bindgen-runtime", "lz4", "zstd"] }
mmdb = "2.2.1"

vsdb_core = { path = "core", version = "10.0.1", default-features = false }

criterion = "0.8"
hex = "0.4"
rand = "0.10"
