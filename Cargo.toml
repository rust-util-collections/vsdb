[workspace]
members = [
    "core",
    "strata",
]
resolver = "3"

[workspace.dependencies]
ruc = "9.1.0"
thiserror = "2.0"

rand = "0.9.2"
parking_lot = "0.12.1"

serde = { version = "1.0.136", features = ["derive"] }
msgpack = { package = "rmp-serde", version = "1.1.1" }
serde_cbor_2 = "0.13.0"
sha3 = "0.10"

rocksdb = { version = "0.24.0", default-features = false, features = ["bindgen-runtime", "lz4", "zstd"] }

vsdb_core = { path = "core", version = "9.1.0", default-features = false }

