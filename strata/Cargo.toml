[package]
name = "vsdb"
version = "9.1.0"
authors = ["hui.fan@mail.ru"]
edition = "2024"
description = "A std-collection-like database"
homepage = "https://github.com/rust-util-collections/vsdb"
repository = "https://github.com/rust-util-collections/vsdb/tree/master/strata"
keywords = ["kv", "leveldb", "rocksdb", "std"]
categories = ["database-implementations", "data-structures", "algorithms", "caching"]
license = "MIT"

[package.metadata.docs.rs]
# features = []

[dependencies]
serde = { workspace = true }
parking_lot = { workspace = true }

msgpack = { workspace = true, optional = true }
serde_cbor_2 = { workspace = true, optional = true }

ruc = { workspace = true }
vsdb_core = { workspace = true }

sha3 = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
rand = { workspace = true }
hex = "0.4"
criterion = "0.8"

[features]
default = ["msgpack_codec"]

serde_ende = []
msgpack_codec = ["serde_ende", "msgpack"]
cbor_codec = ["serde_ende", "serde_cbor_2"]

[[bench]]
name = "basic"
harness = false

[[bench]]
name = "versioned"
harness = false

[[bench]]
name = "slotdex"
harness = false

[[bench]]
name = "trie_bench"
harness = false
